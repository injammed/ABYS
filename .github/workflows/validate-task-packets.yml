name: Validate ABYS Task Packets

on:
  pull_request:
    paths:
      - 'schemas/**/*.json'
      - 'examples/**/*.json'
      - 'tests/**/*.py'
      - 'requirements-dev.txt'
      - '.github/workflows/validate-task-packets.yml'
  push:
    branches:
      - main
    paths:
      - 'schemas/**/*.json'
      - 'examples/**/*.json'
      - 'tests/**/*.py'
      - 'requirements-dev.txt'
      - '.github/workflows/validate-task-packets.yml'

jobs:
  validate-task-packets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate task-packet schema and examples
        run: python -m pytest tests/test_task_packet_schema.py
